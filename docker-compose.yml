services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: arxiv_rag
      POSTGRES_USER: arxiv
      POSTGRES_PASSWORD: arxiv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arxiv -d arxiv_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+psycopg2://arxiv:arxiv@postgres:5432/arxiv_rag
      CHROMA_PATH: /app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Host port 8010 (8000 is used by another local project); container stays 8000.
      - "8010:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    ports:
      # Host port 8510 (8501 is used by another local project); container stays 8501.
      - "8510:8501"

volumes:
  postgres_data:
