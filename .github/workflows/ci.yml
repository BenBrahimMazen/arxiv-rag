name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EMBEDDING_BACKEND: local
  RERANKER_BACKEND: local
  LLM_BACKEND: echo
  VECTOR_BACKEND: chroma
  POSTGRES_URL: "sqlite+pysqlite:///:memory:"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy pydantic
      - run: mypy src/ || true  # advisory; does not block the pipeline

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

# Note: RAGAS evaluation needs an LLM key AND an ingested paper index, so it can't
# run on a clean CI checkout. It lives in a separate, on-demand workflow:
# .github/workflows/evaluate.yml (run manually once papers are ingested).
