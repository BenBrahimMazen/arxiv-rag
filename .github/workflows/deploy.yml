name: Deploy

# Auto-deploy to the EC2 host after the CI workflow succeeds on main.
# (Runs on push to main once "CI" is green; also triggerable manually.)
#
# Requires these repository secrets:
#   EC2_HOST        - Elastic IP or domain of the instance
#   EC2_USER        - SSH user (e.g. "ubuntu")
#   EC2_SSH_KEY     - private key matching the instance's authorized_keys
#   EC2_APP_DIR     - absolute path to the checkout on the server (e.g. /home/ubuntu/arxiv-rag)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passed (or when triggered manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            # Smoke-check the API health endpoint.
            sleep 10
            curl -fsS http://localhost:8000/health || (echo "Health check failed" && exit 1)
