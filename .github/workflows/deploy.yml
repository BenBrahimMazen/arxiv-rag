name: Deploy

# Auto-deploy to the Azure VM after images are published to GHCR.
# The VM only pulls the prebuilt images (no heavy build on the VM).
#
# Requires these repository secrets:
#   VM_HOST        - static public IP or domain of the VM
#   VM_USER        - SSH user (e.g. "azureuser")
#   VM_SSH_KEY     - private key matching the VM's authorized_keys
#   VM_APP_DIR     - absolute path to the checkout on the server (e.g. /home/azureuser/arxiv-rag)

on:
  workflow_run:
    workflows: ["Build Images"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passed (or when triggered manually).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check deploy is configured
        id: gate
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "::notice::No VM_HOST secret set — skipping deploy (configure server secrets to enable)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VM_APP_DIR }}"
            git fetch --all
            git reset --hard origin/main
            # Pull the prebuilt images from GHCR (no build on the VM).
            docker compose -f docker-compose.prod.yml pull api frontend
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            # Smoke-check the API health endpoint.
            sleep 10
            curl -fsS http://localhost:8000/health || (echo "Health check failed" && exit 1)
